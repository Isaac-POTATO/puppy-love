<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>❤️ 给我的宝贝 ❤️</title>
<style>
  /* ====== 全局重置 ====== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ====== 页面背景 + 浮动爱心 ====== */
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 25%, #f48fb1 50%, #f8bbd0 75%, #fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 8s ease-in-out infinite;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* 浮动爱心粒子 */
  .hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .floating-heart {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0.35;
    font-size: 24px;
    user-select: none;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(100vh) scale(0) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 0.4;
    }
    90% {
      opacity: 0.3;
    }
    100% {
      transform: translateY(-10vh) scale(1.2) rotate(360deg);
      opacity: 0;
    }
  }

  /* ====== 主卡片 ====== */
  .main-card {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 40px 35px 35px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(233, 30, 99, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
    max-width: 480px;
    width: 90%;
    animation: cardEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes cardEntry {
    0% {
      transform: scale(0.3) translateY(40px);
      opacity: 0;
    }
    100% {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  }

  /* 标题 */
  .title {
    font-size: 2.2em;
    font-weight: 800;
    background: linear-gradient(135deg, #e91e63, #f06292, #ec407a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    animation: titlePulse 2s ease-in-out infinite;
    letter-spacing: 2px;
  }

  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .subtitle {
    font-size: 0.95em;
    color: #ad1457;
    margin-bottom: 22px;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  /* 图片容器 */
  .img-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(233, 30, 99, 0.25);
    margin-bottom: 28px;
    animation: imgFloat 3s ease-in-out infinite;
  }

  @keyframes imgFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .img-wrapper img {
    display: block;
    max-width: 100%;
    height: auto;
    max-height: 260px;
    border-radius: 20px;
    object-fit: contain;
  }

  /* 图片周围的闪烁光晕 */
  .img-wrapper::after {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border-radius: 22px;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #ff9a9e);
    background-size: 400% 400%;
    z-index: -1;
    animation: glowRotate 3s linear infinite;
    opacity: 0.7;
  }

  @keyframes glowRotate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ====== 按钮区域 ====== */
  .btn-group {
    position: relative;
    min-height: 70px;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 16px 36px;
    font-size: 1.15em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 1px;
    outline: none;
    position: relative;
    overflow: hidden;
    font-family: inherit;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff6b9d, #e91e63);
    color: #fff;
    box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);
    font-size: 1.3em;
    padding: 18px 44px;
  }

  .btn-yes:hover {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 12px 35px rgba(233, 30, 99, 0.5);
  }

  .btn-yes:active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
  }

  /* 小爪印装饰 */
  .btn-yes::before {
    content: '🐾';
    margin-right: 6px;
  }

  .btn-no {
    background: linear-gradient(135deg, #b0bec5, #78909c);
    color: #fff;
    box-shadow: 0 8px 25px rgba(120, 144, 156, 0.35);
    position: relative;
    z-index: 20;
  }

  .btn-no:hover {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 12px 35px rgba(120, 144, 156, 0.45);
  }

  /* ====== 弹窗遮罩 ====== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-overlay.hidden {
    display: none;
  }

  /* 弹窗关闭 ✕ 按钮 */
  .modal-close-x {
    position: absolute;
    top: 12px;
    right: 16px;
    width: 36px;
    height: 36px;
    border: none;
    background: rgba(0,0,0,0.06);
    border-radius: 50%;
    font-size: 1.2em;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    color: #aaa;
    line-height: 1;
  }
  .modal-close-x:hover {
    background: rgba(0,0,0,0.12);
    color: #555;
    transform: scale(1.1);
  }

  /* 弹窗卡片 */
  .modal-card {
    background: #fff;
    border-radius: 28px;
    padding: 45px 35px 35px;
    text-align: center;
    max-width: 420px;
    width: 88%;
    box-shadow: 0 25px 70px rgba(0,0,0,0.25);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    position: relative;
    overflow: hidden;
  }

  @keyframes popIn {
    0% { transform: scale(0.5) translateY(30px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-emoji {
    font-size: 4.5em;
    animation: bounce 0.6s ease-out infinite alternate;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(-15px); }
  }

  .modal-text {
    font-size: 1.8em;
    font-weight: 800;
    background: linear-gradient(135deg, #e91e63, #f06292);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 15px 0 25px;
    letter-spacing: 2px;
  }

  .btn-close {
    padding: 12px 40px;
    font-size: 1em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff6b9d, #e91e63);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233, 30, 99, 0.35);
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 1px;
  }

  .btn-close:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 28px rgba(233, 30, 99, 0.5);
  }

  /* 弹窗里的彩屑 */
  .confetti {
    position: absolute;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(-100px) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(400px) rotate(720deg);
      opacity: 0;
    }
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .main-card { padding: 30px 20px 25px; }
    .title { font-size: 1.6em; }
    .btn-yes { font-size: 1.1em; padding: 14px 30px; }
    .btn-no { font-size: 1em; padding: 13px 28px; }
    .btn-group { gap: 14px; }
    .modal-text { font-size: 1.4em; }
  }

  /* ====== 🎵 音乐按钮 ====== */
  .music-btn {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 300;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 18px rgba(233,30,99,0.25);
    cursor: pointer;
    font-size: 1.5em;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: musicPulse 2s ease-in-out infinite;
  }
  .music-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 6px 24px rgba(233,30,99,0.4);
  }
  .music-btn.off {
    opacity: 0.55;
    animation: none;
  }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 4px 18px rgba(233,30,99,0.25); }
    50% { box-shadow: 0 4px 30px rgba(233,30,99,0.5); }
  }
  @media (max-width: 480px) {
    .music-btn { width: 42px; height: 42px; font-size: 1.2em; bottom: 14px; right: 14px; }
  }
</style>

<div class="modal-overlay hidden" id="modalOverlay">

    <button class="modal-close-x" onclick="closeModal()" title="关闭">✕</button>
    <div class="modal-emoji">🐶</div>

<script>
  // ====== 生成浮动爱心 ======
  (function createHearts() {
    const container = document.getElementById('heartsContainer');
    const emojis = ['💕', '💖', '💗', '💝', '💘', '🩷', '🐾', '✨', '🌸', '🎀', '💌', '🫶'];
    for (let i = 0; i < 28; i++) {
      const heart = document.createElement('span');
      heart.className = 'floating-heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 95 + '%';
      heart.style.fontSize = (16 + Math.random() * 28) + 'px';
      heart.style.animationDuration = (6 + Math.random() * 10) + 's';
      heart.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(heart);
    }
  })();

  // ====== 弹窗彩屑 ======
  function spawnConfetti(parent) {
    const colors = ['#ff6b9d', '#e91e63', '#f06292', '#ff9a9e', '#fbc2eb', '#ffd54f', '#ff8a80', '#ea80fc'];
    for (let i = 0; i < 40; i++) {
      const confetti = document.createElement('span');
      confetti.className = 'confetti';
      confetti.textContent = ['💕','💖','🌸','✨','🎀','💝'][Math.floor(Math.random() * 6)];
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = -(Math.random() * 60) + 'px';
      confetti.style.fontSize = (16 + Math.random() * 22) + 'px';
      confetti.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      confetti.style.animationDelay = Math.random() * 0.6 + 's';
      parent.appendChild(confetti);

      // 自动清除
      setTimeout(() => confetti.remove(), 3500);
    }
  }

  // ====== 点击"我要！" ======
  function sayYes() {
    const overlay = document.getElementById('modalOverlay');
    const modalCard = document.getElementById('modalCard');
    overlay.classList.remove('hidden');

    // 重新触发弹窗动画
    modalCard.style.animation = 'none';
    modalCard.offsetHeight; // 强制回流
    modalCard.style.animation = 'popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';

    spawnConfetti(modalCard);
  }

  // ====== 关闭弹窗 ======
  function closeModal() {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.add('hidden');
    // 清理剩余彩屑
    document.querySelectorAll('.confetti').forEach(c => c.remove());
  }

  // 点击遮罩关闭
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // 按 Esc 键关闭弹窗
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const overlay = document.getElementById('modalOverlay');
      if (!overlay.classList.contains('hidden')) closeModal();
    }
  });

  // ====== 点击"我才不要" → 随机逃跑 ======
  const btnNo    = document.getElementById('btnNo');
  const btnYes   = document.getElementById('btnYes');
  const btnGroup = document.getElementById('btnGroup');
  const mainCard = document.querySelector('.main-card');
  let noClickCount = 0;
  let buttonsPinned = false;
  let pinnedYesL, pinnedYesT, pinnedYesW, pinnedYesH; // 记录「我要！」位置

  // 逃跑俏皮话
  const teasingMessages = [
    '别跑嘛~ 😏', '你跑不掉的~ 💕', '乖乖点"我要"吧~ 🐶',
    '哼，还想跑？😈', '小坏蛋，别躲啦~ 🎀', '你已经被锁定啦~ 🔒',
    '再跑我就撒娇了哦~ 🥺', '汪汪，快回来~ 🐾'
  ];

  /** 判断两个矩形是否重叠（带安全边距） */
  function rectsOverlap(r1, r2, margin) {
    return !(
      r1.right  + margin <= r2.left   ||
      r1.left   - margin >= r2.right  ||
      r1.bottom + margin <= r2.top    ||
      r1.top    - margin >= r2.bottom
    );
  }

  function sayNo() {
    noClickCount++;

    // === 第一次点击：把「我才不要」移入卡片内部，用卡片坐标 absolute 定位 ===
    if (!buttonsPinned) {
      const cardRect = mainCard.getBoundingClientRect();

      // 记录「我要！」在卡片内的相对位置（不碰它）
      const yesRect = btnYes.getBoundingClientRect();
      pinnedYesL = yesRect.left - cardRect.left;
      pinnedYesT = yesRect.top  - cardRect.top;
      pinnedYesW = yesRect.width;
      pinnedYesH = yesRect.height;

      // 「我才不要」改为卡片内 absolute 定位
      const noRect = btnNo.getBoundingClientRect();
      btnNo.style.position = 'absolute';
      btnNo.style.left = (noRect.left - cardRect.left) + 'px';
      btnNo.style.top  = (noRect.top  - cardRect.top)  + 'px';
      btnNo.style.margin = '0';
      mainCard.appendChild(btnNo); // 移入卡片，坐标体系一致

      buttonsPinned = true;
    }

    btnNo.style.transition = 'all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';

    // 全部使用卡片内部相对坐标，绝不跑出白色区域
    const noW = btnNo.offsetWidth;
    const noH = btnNo.offsetHeight;
    const cardW = mainCard.clientWidth;
    const cardH = mainCard.clientHeight;
    const SAFE = 20;
    const pad = 16;

    const areaLeft   = pad;
    const areaRight  = cardW - noW - pad;
    const areaTop    = pad;
    const areaBottom = cardH - noH - pad;

    const rangeX = Math.max(0, areaRight - areaLeft);
    const rangeY = Math.max(0, areaBottom - areaTop);

    // 「我要！」在卡片内的矩形
    const yesRel = {
      left: pinnedYesL, right: pinnedYesL + pinnedYesW,
      top: pinnedYesT,  bottom: pinnedYesT + pinnedYesH
    };

    let bestX = null, bestY = null;

    // 随机尝试 800 次，不与「我要！」重合
    for (let i = 0; i < 800; i++) {
      const cx = areaLeft + Math.random() * rangeX;
      const cy = areaTop  + Math.random() * rangeY;
      if (!rectsOverlap({ left: cx, right: cx + noW, top: cy, bottom: cy + noH }, yesRel, SAFE)) {
        bestX = cx; bestY = cy; break;
      }
    }

    // 四方向兜底
    if (bestX === null) {
      const opts = [];
      if (yesRel.top - noH - SAFE >= 0)
        opts.push({ x: yesRel.left, y: yesRel.top - noH - SAFE });
      if (yesRel.bottom + SAFE + noH <= cardH)
        opts.push({ x: yesRel.left, y: yesRel.bottom + SAFE });
      if (yesRel.left - noW - SAFE >= 0)
        opts.push({ x: yesRel.left - noW - SAFE, y: yesRel.top });
      if (yesRel.right + SAFE + noW <= cardW)
        opts.push({ x: yesRel.right + SAFE, y: yesRel.top });
      opts.push({ x: pad, y: pad });
      opts.push({ x: cardW - noW - pad, y: cardH - noH - pad });

      for (const opt of opts) {
        if (!rectsOverlap({ left: opt.x, right: opt.x + noW, top: opt.y, bottom: opt.y + noH }, yesRel, SAFE)) {
          bestX = opt.x; bestY = opt.y; break;
        }
      }
      if (bestX === null) { bestX = pad; bestY = pad; }
    }

    btnNo.style.left = bestX + 'px';
    btnNo.style.top  = bestY + 'px';

    // 俏皮话
    if (noClickCount <= 3) {
      showToast(teasingMessages[noClickCount - 1]);
    } else if (noClickCount <= 8) {
      showToast(teasingMessages[noClickCount - 1] || '你跑我也追~ 🏃‍♂️💨');
    } else {
      showToast('好啦好啦，快按那个粉色的吧~ 🥺💕');
    }
  }
  // ====== Toast 提示 ======
  function showToast(msg) {
    // 移除旧 toast
    const old = document.querySelector('.toast-msg');
    if (old) old.remove();

    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    toast.style.cssText = `
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1.05em;
      font-weight: 600;
      z-index: 200;
      animation: toastAnim 2.2s ease-out forwards;
      pointer-events: none;
      font-family: inherit;
      letter-spacing: 1px;
      white-space: nowrap;
    `;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2300);
  }

  // Toast 动画样式注入
  const toastStyle = document.createElement('style');
  toastStyle.textContent = `
    @keyframes toastAnim {
      0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
  `;
  document.head.appendChild(toastStyle);

  // ====== 🎵 音乐控制 ======
  const bgMusic = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  let musicOn = true; // 默认播放中

  function toggleMusic() {
    if (musicOn) {
      bgMusic.pause();
      musicBtn.textContent = '🎵';
      musicBtn.classList.add('off');
    } else {
      bgMusic.play().catch(() => {});
      musicBtn.textContent = '🎶';
      musicBtn.classList.remove('off');
    }
    musicOn = !musicOn;
  }

  // 🎵 页面渲染完成后自动播放（延迟加载，避免48MB音频阻塞页面渲染）
  window.addEventListener('load', function() {
    setTimeout(function() {
      bgMusic.play().then(function() {
        musicOn = true;
        musicBtn.textContent = '🎶';
        musicBtn.classList.remove('off');
      }).catch(function() {
        // 浏览器拦截自动播放 → 首次点击时再试
        musicOn = false;
        musicBtn.textContent = '🎵';
        musicBtn.classList.add('off');
        document.addEventListener('click', function resumeOnClick() {
          bgMusic.play().then(function() {
            musicOn = true;
            musicBtn.textContent = '🎶';
            musicBtn.classList.remove('off');
          }).catch(function() {});
        }, { once: true });
      });
    }, 300);
  });
</script>

</body>
